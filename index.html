<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<title>SRCCS – Agent Transaction Entry</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>
:root{
  --primary:#1a237e;
  --primary-dark:#0d154f;
  --bg:#eef2f7;
  --border:#c5cae9;
  --success:#2e7d32;
  --danger:#c62828;
}

*{box-sizing:border-box;font-family:Arial, Helvetica, sans-serif}

body{margin:0;background:var(--bg);font-size:13px}

.app{max-width:420px;margin:20px auto;padding:12px}

.card{background:#fff;border:1px solid var(--border);padding:16px}

h2{text-align:center;margin:0 0 4px;font-size:16px;color:var(--primary)}

p{text-align:center;margin:0 0 14px;font-size:11px;color:#444}

label{font-size:11px;font-weight:bold;margin-top:10px;display:block}

input,select{
width:100%;
padding:7px 6px;
margin-top:4px;
font-size:13px;
border:1px solid var(--primary)
}

input[readonly]{background:#f3f4f9}

button{
width:100%;
margin-top:16px;
padding:9px;
font-size:13px;
font-weight:bold;
background:var(--primary);
color:#fff;
border:none;
cursor:pointer
}

button:hover{background:var(--primary-dark)}

.msg{text-align:center;font-size:12px;font-weight:bold;margin-top:8px}

.ok{color:var(--success)}
.err{color:var(--danger)}

.verify-wrap{position:relative}

.verify-tick{
position:absolute;
right:6px;
top:55%;
transform:translateY(-50%);
font-size:11px;
color:var(--success);
display:none
}

.history-box{margin-top:16px;border-top:1px solid var(--border);padding-top:10px}

.history-item{border-bottom:1px solid var(--border);padding:6px 0;font-size:12px}

.h-credit{color:var(--success);font-weight:bold}
.h-debit{color:var(--danger);font-weight:bold}

.small{font-size:10px;color:#555}
</style>
</head>

<body>

<div class="app">
<div class="card">

<h2>Agent Daily Entry</h2>
<p>Shree Radha Credit Co-operative Society</p>

<label>Account Number</label>
<input id="account" placeholder="SRC1234">

<label>Customer Name</label>
<div class="verify-wrap">
<input id="name" readonly>
<div id="tick" class="verify-tick">✔ Verified</div>
</div>

<label>Transaction Type</label>
<select id="type">
<option value="credit">Credit</option>
<option value="debit">Debit</option>
</select>

<label>Amount</label>
<input id="amount" type="number">

<label>Agent ID</label>
<select id="agent">
<option value="">Select</option>
<option>SH7333</option>
<option>KA4564</option>
<option>JE2659</option>
<option>SRCCS1432</option>
</select>

<label>Mode</label>
<select id="mode">
<option>Cash</option>
<option>UPI</option>
<option>Cheque</option>
</select>

<label>Remarks</label>
<input id="remarks">

<button onclick="saveEntry()">SAVE ENTRY</button>
<div id="msg" class="msg"></div>

<div class="history-box">
<h4>Transaction History (Last 24 Hours)</h4>
<div id="totalBox">Total Collection: ₹0</div>
<div id="historyList"></div>
</div>

</div>
</div>

<script>

const API="https://script.google.com/macros/s/AKfycbwCyrMFcS_ve6xlPbBLPTAv4Cvxega50CQwXWc9dPrY84ItQLWhWe7pJ6igk0fmNo5b/exec";

const account=document.getElementById("account");
const name=document.getElementById("name");
const tick=document.getElementById("tick");
const msg=document.getElementById("msg");
const amount=document.getElementById("amount");
const type=document.getElementById("type");
const agent=document.getElementById("agent");
const mode=document.getElementById("mode");
const remarks=document.getElementById("remarks");
const historyList=document.getElementById("historyList");
const totalBox=document.getElementById("totalBox");

let t=null;

/* NAME FETCH */

account.addEventListener("input",()=>{
clearTimeout(t);
t=setTimeout(fetchName,400);
});

function fetchName(){

let acc=account.value.trim();
if(!acc) return;

if(!acc.startsWith("SRC")) acc="SRC"+acc;
account.value=acc;

fetch(API+"?fn=getName&account="+acc)
.then(r=>r.json())
.then(d=>{
if(d.success){
name.value=d.name;
tick.style.display="block";
}else{
name.value="";
tick.style.display="none";
}
});

}

/* SAVE ENTRY */

function saveEntry(){

if(!account.value||!amount.value||!agent.value){

msg.innerText="❌ Required fields missing";
msg.className="msg err";
return;

}

const data=new URLSearchParams();

data.append("action","addLedger");
data.append("account",account.value);
data.append("amount",amount.value);
data.append("type",type.value);
data.append("agent",agent.value);
data.append("mode",mode.value);
data.append("remarks",remarks.value);
data.append("location","Agent");

fetch(API,{
method:"POST",
body:data
})
.then(()=>{

msg.innerText="✔ Entry Saved";
msg.className="msg ok";

setTimeout(()=>location.reload(),800);

})
.catch(()=>{

msg.innerText="❌ Network error";
msg.className="msg err";

});

}

</script>

</body>
</html>
