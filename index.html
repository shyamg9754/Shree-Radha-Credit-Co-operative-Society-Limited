<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<title>SRCCS – Agent Transaction Entry</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<script>
/* ===== PASSWORD PROTECTION ===== */
const PAGE_PASSWORD = "1234";   // 👉 Yaha apna password set kare

(function(){
  const entered = prompt("Enter Password to Open Page:");
  if(entered !== PAGE_PASSWORD){
    document.write("<h2 style='text-align:center;margin-top:100px;color:red;'>Access Denied ❌</h2>");
    throw new Error("Wrong Password");
  }
})();
</script>

<style>
/* ===== AAPKA PURA ORIGINAL CSS YAHA SAME RAHEGA ===== */

:root{
  --primary:#1a237e;
  --primary-dark:#0d154f;
  --bg:#eef2f7;
  --border:#c5cae9;
  --success:#2e7d32;
  --danger:#c62828;
}

*{
  box-sizing:border-box;
  font-family:Arial, Helvetica, sans-serif;
}

body{
  margin:0;
  background:var(--bg);
  font-size:13px;
}

.app{
  max-width:420px;
  margin:20px auto;
  padding:12px;
}

.card{
  background:#fff;
  border:1px solid var(--border);
  padding:16px;
}

/* ===== HEADER ===== */
h2{
  text-align:center;
  margin:0 0 4px;
  font-size:16px;
  font-weight:bold;
  color:var(--primary);
}

p{
  text-align:center;
  margin:0 0 14px;
  font-size:11px;
  color:#444;
}

/* ===== FORM ===== */
label{
  font-size:11px;
  font-weight:bold;
  margin-top:10px;
  display:block;
}

input,select{
  width:100%;
  padding:7px 6px;
  margin-top:4px;
  font-size:13px;
  border:1px solid var(--primary);
  background:#fff;
}

input[readonly]{
  background:#f3f4f9;
}

button{
  width:100%;
  margin-top:16px;
  padding:9px;
  font-size:13px;
  font-weight:bold;
  background:var(--primary);
  color:#fff;
  border:none;
  cursor:pointer;
}

button:hover{
  background:var(--primary-dark);
}

/* ===== MESSAGE ===== */
.msg{
  text-align:center;
  font-size:12px;
  font-weight:bold;
  margin-top:8px;
}

/* SUCCESS MESSAGE */
.msg-success{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  color:var(--success);
  font-size:13px;
  font-weight:bold;
  margin-top:10px;
}

.msg-success span{
  font-size:16px;
}
.err{color:var(--danger)}

/* ===== LOCATION ===== */
.loc-ok{
  color:var(--success);
  font-size:11px;
  font-weight:bold;
}

.loc-wait{
  color:var(--danger);
  font-size:11px;
  font-weight:bold;
}

/* ===== VERIFY TICK ===== */
.verify-wrap{position:relative}

.verify-tick{
  position:absolute;
  right:6px;
  top:55%;
  transform:translateY(-50%);
  font-size:11px;
  color:var(--success);
  font-weight:bold;
  display:none;
}

/* ===== HISTORY ===== */
.history-box{
  margin-top:16px;
  border-top:1px solid var(--border);
  padding-top:10px;
}

.history-box h4{
  text-align:center;
  font-size:13px;
  margin-bottom:8px;
  color:var(--primary);
}

.total-box{
  text-align:center;
  font-size:12px;
  font-weight:bold;
  margin-bottom:8px;
}

.history-item{
  border-bottom:1px solid var(--border);
  padding:6px 0;
  font-size:12px;
}

.h-credit{
  color:var(--success);
  font-weight:bold;
}

.h-debit{
  color:var(--danger);
  font-weight:bold;
}

.small{
  font-size:10px;
  color:#555;
}

/* LOADER */
/* OVERLAY */
.loader-overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(255,255,255,0.8);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
}

/* CENTER BOX */
#loaderContent{
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
}

/* SPINNER */
.loader{
  border:6px solid #f3f3f3;
  border-top:6px solid #1a237e;
  border-radius:50%;
  width:60px;
  height:60px;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  0%{transform:rotate(0deg);}
  100%{transform:rotate(360deg);}
}

/* SUCCESS TICK */
.success-tick{
  display:none;
  font-size:70px;
  color:#2e7d32;
  font-weight:bold;
  animation:pop 0.3s ease-in-out;
}

@keyframes pop{
  0%{transform:scale(0);}
  100%{transform:scale(1);}
}
</style>
</head>

<body>
  <div class="loader-overlay" id="loader">
  <div id="loaderContent">
    <div class="loader" id="spinner"></div>
    <div class="success-tick" id="successTick">✔</div>
  </div>
</div>
<div class="app">
<div class="card">

<h2>Agent Daily Entry</h2>
<p>Shree Radha Credit Co-operative Society</p>

<label>Account Number</label>
<input id="account" placeholder="SRC1234">

<label>Customer Name</label>
<div class="verify-wrap">
  <input id="name" readonly>
  <div id="tick" class="verify-tick">✔ Verified</div>
</div>

<label>Transaction Type</label>
<select id="type">
  <option value="credit">Credit</option>
  <option value="debit">Debit</option>
</select>

<label>Amount</label>
<input id="amount" type="number">

<label>Agent ID</label>
<select id="agent">
  <option value="">Select</option>
   <option>AR4957</option>
  <option>SH7333</option>
  <option>KA4564</option>
  <option>JE2659</option>
  <option>SRCCS1432</option>
</select>

<label>Mode</label>
<select id="mode">
  <option>Cash</option>
  <option>UPI</option>
  <option>Cheque</option>
</select>

<label>Location Status</label>
<div id="locStatus" class="loc-wait">Detecting location…</div>

<label>Remarks</label>
<input id="remarks">

<button id="saveBtn" onclick="saveEntry()">SAVE ENTRY</button>
<div id="msg" class="msg"></div>

<div class="history-box">
  <h4>Transaction History (Last 24 Hours)</h4>
  <div class="total-box" id="totalBox">Total Collection: ₹0</div>
  <div id="historyList"></div>
</div>

</div>
</div>
<script>
const API="https://script.google.com/macros/s/AKfycbxQd7KMxMrFXRblw-rk4pB57vKJ3Azk_rJR5-vIBNjiDf_BGdjh1z7IvdRk2SbriOih/exec";

const account=document.getElementById("account");
const name=document.getElementById("name");
const tick=document.getElementById("tick");
const msg=document.getElementById("msg");
const amount=document.getElementById("amount");
const type=document.getElementById("type");
const agent=document.getElementById("agent");
const mode=document.getElementById("mode");
const remarks=document.getElementById("remarks");
const historyList=document.getElementById("historyList");
const totalBox=document.getElementById("totalBox");
const locStatus=document.getElementById("locStatus");
const saveBtn=document.getElementById("saveBtn");
const loader=document.getElementById("loader");

let t=null;
let CURRENT_LOCATION=null;

/* ================= LOCATION ================= */
function initLocation(){
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(
      pos=>{
        CURRENT_LOCATION=`Lat:${pos.coords.latitude.toFixed(6)}, Lng:${pos.coords.longitude.toFixed(6)}`;
        locStatus.innerText="Location detected ✔";
        locStatus.className="loc-ok";
      },
      ()=>{
        locStatus.innerText="❌ Location required";
        locStatus.className="loc-wait";
      }
    );
  }
}

window.onload=()=>{
  initLocation();
  showHistory();
};

/* ================= FETCH NAME ================= */
account.addEventListener("input",()=>{
  clearTimeout(t);
  t=setTimeout(fetchName,400);
});

function fetchName(){
  let acc=account.value.trim();
  if(!acc)return;

  if(!acc.startsWith("SRC")) acc="SRC"+acc;
  account.value=acc;

  fetch(`${API}?fn=getName&account=${acc}`)
    .then(r=>r.json())
    .then(d=>{
      if(d.success){
        name.value=d.name;
        tick.style.display="block";
      }else{
        name.value="";
        tick.style.display="none";
      }
    });
}

/* ================= HISTORY ================= */
function showHistory(){
  let h=JSON.parse(localStorage.getItem("SRCCS_HISTORY")||"{}");
  let all=[],total=0;

  Object.values(h).forEach(arr=>{
    arr.forEach(x=>{
      all.push(x);
      if(x.type==="credit") total+=Number(x.amount);
    });
  });

  all.sort((a,b)=>b.time-a.time);
  historyList.innerHTML="";

  all.forEach(x=>{
    historyList.innerHTML+=`
      <div class="history-item">
        <b>${x.name}</b> (${x.account})<br>
        <span class="${x.type==="credit"?"h-credit":"h-debit"}">
          ${x.type.toUpperCase()} ₹${x.amount}
        </span><br>
        <span class="small">${new Date(x.time).toLocaleString()} | Agent:${x.agent}</span>
      </div>`;
  });

  totalBox.innerText="Total Collection: ₹"+total;
}


/* ================= SAVE ENTRY ================= */
function saveEntry(){

  if(!CURRENT_LOCATION){
    msg.innerText="❌ Location not detected";
    msg.className="msg err";
    return;
  }

  if(!name.value){
    msg.innerText="❌ Account not verified";
    msg.className="msg err";
    return;
  }

  if(!account.value||!amount.value||!agent.value){
    msg.innerText="❌ Required fields missing";
    msg.className="msg err";
    return;
  }

  const spinner=document.getElementById("spinner");
  const successTick=document.getElementById("successTick");

  loader.style.display="flex";
  spinner.style.display="block";
  successTick.style.display="none";
  saveBtn.disabled=true;

  fetch(API,{
    method:"POST",
    mode:"cors",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      action:"addLedger",
      account:account.value,
      amount:amount.value,
      type:type.value,
      agent:agent.value,
      mode:mode.value,
      remarks:remarks.value,
      location:CURRENT_LOCATION
    })
  })
  .then(()=>{

    /* SPINNER HIDE */
    spinner.style.display="none";

    /* SHOW GREEN TICK */
    successTick.style.display="block";

    /* LOCAL HISTORY UPDATE */
    let h=JSON.parse(localStorage.getItem("SRCCS_HISTORY")||"{}");
    if(!h[account.value]) h[account.value]=[];
    h[account.value].push({
      account:account.value,
      name:name.value,
      amount:amount.value,
      type:type.value,
      agent:agent.value,
      mode:mode.value,
      remarks:remarks.value,
      time:Date.now()
    });
    localStorage.setItem("SRCCS_HISTORY",JSON.stringify(h));

    setTimeout(()=>{
      loader.style.display="none";
      saveBtn.disabled=false;

      account.value="";
      name.value="";
      amount.value="";
      remarks.value="";
      tick.style.display="none";
      showHistory();
    },1200);

  })
  .catch(()=>{
    loader.style.display="none";
    saveBtn.disabled=false;
    msg.innerText="❌ Network error";
    msg.className="msg err";
  });
}
</script>
</body>
</html>
